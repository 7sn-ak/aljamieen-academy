<!doctype html>
<!-- النشر التلقائي مفعّل عبر GitHub Actions -->
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#2a2e33" />
  <title>أكاديمية الجامعيين — متابعة علمية</title>
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="icon" href="./icon.png?v=2" />
  <link rel="apple-touch-icon" sizes="180x180" href="./apple-touch-icon-180.png?v=2" />
  <link rel="apple-touch-icon" sizes="167x167" href="./apple-touch-icon-167.png?v=2" />
  <link rel="apple-touch-icon" sizes="152x152" href="./apple-touch-icon-152.png?v=2" />
  <link rel="apple-touch-icon" href="./apple-touch-icon.png?v=2" />
  <link rel="apple-touch-icon-precomposed" href="./apple-touch-icon.png?v=2" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="الجامعيين" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Tajawal:wght@400;500;600;700&family=Aref+Ruqaa:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./app.css" />
</head>
<body>
  <!-- مبدّل العرض (للنموذج فقط: تنقّل بين عرض الطالب وعرض المشرف) -->
  <button id="roleSwitch" class="role-switch">عرض: <b id="roleLabel">الطالب</b> ⇄</button>

  <div class="app-frame" id="app"><!-- يُحقن العرض هنا --></div>
  <div class="toast" id="toast"></div>

  <script src="./mock-data.js"></script>
  <script src="./app.js"></script>
  <!-- ▼ Firebase مُفعّل (الموقع الحقيقي بحسابات وإشعارات) -->
  <script src="./firebase/firebase-config.js"></script>
  <script type="module" src="./firebase/firebase-integration.js"></script>
  <script>
    // تسجيل تطبيق PWA + تحديث تلقائي: يلتقط أي نسخة جديدة منشورة ويحدّث الاختصار فوراً
    if ('serviceWorker' in navigator && location.protocol.startsWith('http')) {
      window.addEventListener('load', async () => {
        try {
          const reg = await navigator.serviceWorker.register('./sw.js');
          // تحقّق من وجود تحديث الآن، وعند العودة للتطبيق، وكل ساعة
          reg.update();
          document.addEventListener('visibilitychange', () => { if (!document.hidden) reg.update(); });
          setInterval(() => reg.update(), 60 * 60 * 1000);
          // عند توفّر نسخة جديدة: فعّلها وأعد تحميل الصفحة تلقائياً
          reg.addEventListener('updatefound', () => {
            const nw = reg.installing;
            if (!nw) return;
            nw.addEventListener('statechange', () => {
              if (nw.state === 'installed' && navigator.serviceWorker.controller) {
                nw.postMessage('SKIP_WAITING');
              }
            });
          });
          let refreshing = false;
          navigator.serviceWorker.addEventListener('controllerchange', () => {
            if (refreshing) return; refreshing = true; location.reload();
          });
        } catch (e) {}
      });
    }
  </script>
</body>
</html>
